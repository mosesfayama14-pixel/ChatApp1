on:
push:
branches: [ "main", "master" ]
pull_request:
branches: [ "main", "master" ]

jobs:
build-and-test:
runs-on: ubuntu-latest

steps:
# Step 1: Clone down the repository code into the runner container
- name: Checkout Code Repository
uses: actions/checkout@v4

# Step 2: Establish the Java SDK Environment core dependencies
- name: Set up JDK 17
uses: actions/setup-java@v4
with:
java-version: '17'
distribution: 'temurin'
cache: maven

# Step 3: Run the compilation sequence and test code builds automatically
- name: Execute Automated Unit Testing Suite
run: mvn clean test
